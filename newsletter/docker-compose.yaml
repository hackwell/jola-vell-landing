# listmonk — Newsletter-/Mailinglisten-System für Jola Vell
#
# Deploy auf Coolify als Docker-Compose-App aus diesem Repo:
#   build-pack: dockercompose, base-directory: /newsletter, branch: main
#
# Coolify ersetzt die SERVICE_*-Magic-Variablen automatisch:
#   - SERVICE_FQDN_LISTMONK        → öffentliche Domain (hier: newsletter.weller.cc)
#   - SERVICE_USER/PASSWORD_POSTGRES → generierte DB-Zugangsdaten
#   - SERVICE_PASSWORD_ADMIN        → generiertes listmonk-Admin-Passwort
# Es stehen also KEINE Secrets im Repo.

services:
  listmonk:
    image: 'listmonk/listmonk:v6.0.0'
    environment:
      - 'SERVICE_FQDN_LISTMONK=newsletter.weller.cc'
      - 'SERVICE_FQDN_LISTMONK_9000=newsletter.weller.cc:9000'
      - 'LISTMONK_app__address=0.0.0.0:9000'
      - 'LISTMONK_ADMIN_USER=admin'
      - 'LISTMONK_ADMIN_PASSWORD=$SERVICE_PASSWORD_ADMIN'
      - LISTMONK_db__host=postgres
      - LISTMONK_db__database=listmonk
      - LISTMONK_db__user=$SERVICE_USER_POSTGRES
      - LISTMONK_db__password=$SERVICE_PASSWORD_POSTGRES
      - LISTMONK_db__port=5432
      - TZ=Etc/UTC
    volumes:
      - 'listmonk-data:/listmonk/uploads'
    healthcheck:
      test:
        - CMD
        - wget
        - '-q'
        - '--spider'
        - 'http://127.0.0.1:9000'
      interval: 5s
      timeout: 20s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy

  listmonk-initial-database-setup:
    image: 'listmonk/listmonk:v6.0.0'
    command: './listmonk --install --yes --idempotent'
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - LISTMONK_db__host=postgres
      - LISTMONK_db__database=listmonk
      - LISTMONK_db__user=$SERVICE_USER_POSTGRES
      - LISTMONK_db__password=$SERVICE_PASSWORD_POSTGRES
      - LISTMONK_db__port=5432

  postgres:
    image: 'postgres:18-alpine'
    environment:
      - POSTGRES_DB=listmonk
      - POSTGRES_PASSWORD=$SERVICE_PASSWORD_POSTGRES
      - POSTGRES_USER=$SERVICE_USER_POSTGRES
    volumes:
      - 'postgres-data:/var/lib/postgresql'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}'
      interval: 5s
      timeout: 20s
      retries: 10
